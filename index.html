<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>رسالة حب ❤️</title>
<style>
body{
margin:0;height:100vh;overflow:hidden;background:#000;
display:flex;align-items:center;justify-content:center;
font-family:Arial;
}
.heart{
position:absolute;color:#d60035;font-size:40px;
animation:up 9s linear infinite;opacity:.7
}
@keyframes up{from{transform:translateY(100vh)}
to{transform:translateY(-120vh) rotate(360deg)}}

.box{text-align:center;z-index:2}

.envelope{
width:340px;height:220px;position:relative;
background:linear-gradient(45deg,#8a6238,#c29a62,#76502f);
border-radius:5px;
box-shadow:0 0 25px #7b3f00,inset 0 0 40px #3d220d;
overflow:hidden;
}

.envelope:before{
content:"";
position:absolute;
top:0;left:0;width:100%;height:100px;
background:#b58a55;
clip-path:polygon(0 0,50% 80%,100% 0);
}

.stamp{
position:absolute;right:20px;top:20px;
width:65px;height:65px;background:#eee;
color:#8b0000;border:3px dashed #777;
display:flex;align-items:center;justify-content:center;
font-size:30px;transform:rotate(8deg);
}

.post{
position:absolute;left:25px;bottom:25px;
border:3px solid #7a0000;color:#7a0000;
padding:8px;font-size:16px;
transform:rotate(-12deg);
}

button{
margin-top:30px;padding:15px 45px;
border:0;border-radius:40px;
background:#6b3b16;color:white;
font-size:22px;cursor:pointer;
}

.paper{
display:none;width:370px;padding:35px;
background:linear-gradient(90deg,#d9bd7c,#f2dea5,#cbaa69);
box-shadow:0 0 40px #ffd27a,inset 0 0 35px #80602b;
animation:show .8s;color:#4a2708;
}

@keyframes show{from{transform:scale(.2);opacity:0}
to{transform:scale(1);opacity:1}}

.paper img{width:180px}
.text{font-family:"Times New Roman";font-size:24px;line-height:2;font-weight:bold}
audio{width:100%;margin-top:20px}
</style>
</head>

<body>
<div class="heart" style="left:10%">♡</div>
<div class="heart" style="left:45%;animation-delay:2s">🌹</div>
<div class="heart" style="left:80%;animation-delay:4s">♡</div>

<div class="box">

<div class="envelope" id="env">
<div class="stamp">✉</div>
<div class="post">POST<br>LOVE</div>
</div>

<button onclick="openLetter()">افتح الظرف ❤️</button>

<div class="paper" id="paper">
<img src="love.png">

<div class="text">
في حبك انتي بجد عرفت معني المعجزات
<br>
وحبيتك من اول م شوفتك ينن عيوني من جوا ❤️
</div>

<audio controls id="song">
<source src="song.mp3" type="audio/mpeg">
</audio>
</div>

</div>

<script>
function openLetter(){
document.getElementById("env").style.display="none";
document.querySelector("button").style.display="none";
document.getElementById("paper").style.display="block";
document.getElementById("song").play();
}
</script>

</body>
</html>
